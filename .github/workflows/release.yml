name: Release Obsidian plugin

on:
  push:
    tags:
      - "*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (defaults to the version in manifest.json)"
        required: false
        default: ""

permissions:
  contents: write
  # Required for build provenance attestations of the release assets.
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve release tag
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            tag="${{ github.ref_name }}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"
          else
            tag="$(node -p "require('./manifest.json').version")"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # Cryptographic provenance so users can verify the assets were built
      # from this repository (styles.css ships as-is; main.js is the bundle).
      - name: Attest build provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-path: |
            main.js
            styles.css

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # main.js is self-contained (WASM inlined), so BRAT's three required
          # assets — main.js, manifest.json, styles.css — are all we ship.
          # On workflow_dispatch gh creates the tag at the checked-out commit.
          gh release create "${{ steps.meta.outputs.tag }}" \
            --target "${{ github.sha }}" \
            --title "${{ steps.meta.outputs.tag }}" \
            --notes "Release ${{ steps.meta.outputs.tag }}" \
            main.js manifest.json styles.css
